<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Registrieren — Slezzi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#080810;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(124,106,255,.2),transparent 70%);pointer-events:none}

    .card{width:100%;max-width:400px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:36px 32px;position:relative;z-index:1}

    .logo{text-align:center;margin-bottom:28px}
    .logo-icon{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,#7c6aff,#3b82f6);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:24px;font-weight:800;color:white;box-shadow:0 8px 32px rgba(124,106,255,.4)}
    .logo h1{font-size:22px;font-weight:800;letter-spacing:-.5px}
    .logo p{font-size:13px;color:rgba(255,255,255,.45);margin-top:4px}

    .form-group{margin-bottom:16px}
    .form-group label{display:block;font-size:12px;font-weight:600;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px}
    .form-group input{width:100%;padding:12px 14px;background:#12121a;border:1px solid rgba(255,255,255,.08);border-radius:10px;color:#fff;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}
    .form-group input:focus{border-color:#7c6aff}
    .form-group input::placeholder{color:rgba(255,255,255,.2)}

    /* URL preview input row */
    .url-row{display:flex;background:#12121a;border:1px solid rgba(255,255,255,.08);border-radius:10px;overflow:hidden;transition:border-color .2s}
    .url-row:focus-within{border-color:#7c6aff}
    .url-prefix{padding:12px 12px 12px 14px;color:rgba(255,255,255,.4);font-size:14px;white-space:nowrap;border-right:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03)}
    .url-row input{flex:1;padding:12px 14px;background:transparent;border:none;color:#fff;font-size:14px;font-family:inherit;outline:none}
    .url-row input::placeholder{color:rgba(255,255,255,.2)}

    .terms{display:flex;align-items:flex-start;gap:10px;margin:18px 0;font-size:13px;color:rgba(255,255,255,.45);cursor:pointer}
    .terms input[type=checkbox]{width:16px;height:16px;accent-color:#7c6aff;cursor:pointer;flex-shrink:0;margin-top:1px}
    .terms a{color:#7c6aff;text-decoration:none}
    .terms a:hover{text-decoration:underline}

    .btn-submit{width:100%;padding:13px;background:linear-gradient(135deg,#7c6aff,#3b82f6);border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:.2s;font-family:inherit}
    .btn-submit:hover{opacity:.9;transform:translateY(-1px)}
    .btn-submit:disabled{opacity:.5;cursor:not-allowed;transform:none}

    .error{color:#f87171;font-size:12px;margin-top:6px;display:none;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.2);padding:8px 12px;border-radius:8px}
    .error.show{display:block}

    .footer-link{text-align:center;margin-top:22px;font-size:13px;color:rgba(255,255,255,.35)}
    .footer-link a{color:#7c6aff;font-weight:600;text-decoration:none}
    .footer-link a:hover{text-decoration:underline}

    .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">S</div>
    <h1>Konto erstellen</h1>
    <p>Deine persönliche Profilseite in Sekunden</p>
  </div>

  <form id="registerForm" novalidate>
    <div class="form-group">
      <label>Benutzername</label>
      <input type="text" id="username" placeholder="deinname" autocomplete="username" required maxlength="20"/>
    </div>
    <div class="form-group">
      <label>Passwort</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="new-password" required/>
    </div>
    <div class="form-group">
      <label>E-Mail</label>
      <input type="email" id="email" placeholder="du@beispiel.de" autocomplete="email" required/>
    </div>
    <div class="form-group">
      <label>Bio-URL</label>
      <div class="url-row">
        <span class="url-prefix">slezzi.bio/</span>
        <input type="text" id="urlInput" placeholder="deinname" maxlength="20" readonly/>
      </div>
    </div>

    <div class="terms">
      <input type="checkbox" id="terms"/>
      <label for="terms">Ich habe die <a href="#">Nutzungsbedingungen</a> gelesen und stimme ihnen zu.</label>
    </div>

    <div class="error" id="regError"></div>

    <button type="submit" class="btn-submit" id="regBtn">Registrieren</button>
  </form>

  <div class="footer-link">
    Sie haben bereits ein Konto? <a href="/login">Anmelden</a>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
  if (localStorage.getItem('bl_token')) window.location.href = '/dashboard';

  const usernameInput = document.getElementById('username');
  const urlInput      = document.getElementById('urlInput');

  // Pre-fill from URL param
  const pre = new URLSearchParams(location.search).get('username');
  if (pre) { usernameInput.value = pre; urlInput.value = pre; }

  usernameInput.addEventListener('input', () => {
    urlInput.value = usernameInput.value.trim() || '';
  });

  document.getElementById('registerForm').addEventListener('submit', async e => {
    e.preventDefault();
    const err  = document.getElementById('regError');
    const btn  = document.getElementById('regBtn');
    err.classList.remove('show');

    const username = usernameInput.value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const terms    = document.getElementById('terms').checked;

    if (!terms) { err.textContent = 'Bitte Nutzungsbedingungen akzeptieren.'; err.classList.add('show'); return; }
    if (password.length < 6) { err.textContent = 'Passwort muss mindestens 6 Zeichen haben.'; err.classList.add('show'); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Konto wird erstellt...';

    try {
      const res  = await fetch('/api/register', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ username, email, password }) });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Fehler beim Registrieren');
      localStorage.setItem('bl_token', data.token);
      localStorage.setItem('bl_username', data.username);
      window.location.href = '/dashboard';
    } catch (ex) {
      err.textContent = ex.message;
      err.classList.add('show');
      btn.disabled = false;
      btn.innerHTML = 'Registrieren';
    }
  });
</script>
</body>
</html>
