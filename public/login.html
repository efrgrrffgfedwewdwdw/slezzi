<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Slezzi</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo gradient-text">✦ Slezzi</div>
    <div class="auth-subtitle">Sign in to manage your profile</div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="your_username" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>
      <div class="form-error" id="loginError"></div>
      <button type="submit" class="btn btn-primary" id="loginBtn" style="width:100%; justify-content:center; margin-top:8px;">
        Sign in
      </button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="/register">Create one free</a>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="/js/app.js"></script>
<script>
  // Redirect if already logged in
  if (localStorage.getItem('bl_token')) {
    window.location.href = '/dashboard';
  }

  // Show message if session expired
  if (new URLSearchParams(location.search).get('expired')) {
    const e = document.getElementById('loginError');
    e.textContent = 'Sitzung abgelaufen — bitte neu einloggen';
    e.classList.add('visible');
  }

  const form = document.getElementById('loginForm');
  const errorEl = document.getElementById('loginError');
  const loginBtn = document.getElementById('loginBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorEl.classList.remove('visible');
    loginBtn.disabled = true;
    loginBtn.innerHTML = '<span class="spinner"></span> Signing in...';

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Login failed');
      localStorage.setItem('bl_token', data.token);
      localStorage.setItem('bl_username', data.username);
      window.location.href = '/dashboard';
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.classList.add('visible');
      loginBtn.disabled = false;
      loginBtn.innerHTML = 'Sign in';
    }
  });
</script>
</body>
</html>
