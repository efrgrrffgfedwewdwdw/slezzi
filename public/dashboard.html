<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Slezzi</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<nav class="navbar">
  <a class="navbar-logo" href="/">✦ Slezzi</a>
  <div class="navbar-links">
    <a href="#" id="viewProfileLink" target="_blank" style="font-size:13px;color:rgba(255,255,255,.55);text-decoration:none;padding:7px 14px;border-radius:8px;transition:.2s;" onmouseover="this.style.color='white'" onmouseout="this.style.color='rgba(255,255,255,.55)'">Profil ansehen ↗</a>
    <button class="btn btn-ghost" id="logoutBtn" style="font-size:13px;padding:7px 14px;">Abmelden</button>
  </div>
</nav>

<div class="dashboard-layout">

  <!-- EDITOR PANEL -->
  <div class="dashboard-sidebar" id="editorPanel">

    <div class="section-header">Avatar</div>
    <div class="avatar-upload">
      <div class="avatar-preview" id="avatarPreviewSmall"><span id="avatarEmoji">🙂</span></div>
      <div style="flex:1">
        <input type="url" id="avatarUrl" placeholder="https://example.com/avatar.jpg" class="input-full" />
        <div class="input-hint">Fügen Sie eine Bild-URL für Ihren Avatar ein</div>
      </div>
    </div>

    <div class="section-header">Profilinformationen</div>
    <div class="form-group">
      <label>Anzeigename</label>
      <input type="text" id="displayName" placeholder="Ihr Name" maxlength="50" />
    </div>
    <div class="form-group">
      <label>Bio <span class="char-count" id="bioCount">0/150</span></label>
      <textarea id="bio" placeholder="Erzähle der Welt von dir..." maxlength="150" rows="3"></textarea>
    </div>

    <div class="section-header">Hintergrundverlauf</div>
    <div class="input-row">
      <div class="form-group">
        <label>Farbe 1</label>
        <div class="color-input-group">
          <input type="color" id="bgColor1" value="#a855f7" />
          <input type="text" id="bgColor1Text" value="#a855f7" maxlength="7" />
        </div>
      </div>
      <div class="form-group">
        <label>Farbe 2</label>
        <div class="color-input-group">
          <input type="color" id="bgColor2" value="#3b82f6" />
          <input type="text" id="bgColor2Text" value="#3b82f6" maxlength="7" />
        </div>
      </div>
    </div>
    <div class="form-group">
      <label>Richtung</label>
      <select id="bgDirection">
        <option value="135deg">↗ Diagonal (Standard)</option>
        <option value="to bottom">↓ Von oben nach unten</option>
        <option value="to right">→ Von links nach rechts</option>
        <option value="to top right">↗ Oben rechts</option>
        <option value="to bottom right">↘ Unten rechts</option>
        <option value="225deg">↙ Diagonal umgekehrt</option>
      </select>
    </div>
    <div class="form-group">
      <label>Hintergrundbild URL <span class="input-hint-inline">(überschreibt Gradient)</span></label>
      <input type="url" id="bgImageUrl" placeholder="https://example.com/hintergrund.jpg" />
    </div>
    <div class="form-group">
      <label>Hintergrundbild Blur <span id="bgBlurVal">0</span></label>
      <input type="range" id="bgBlur" min="0" max="20" value="0" style="width:100%;accent-color:#7c6aff;margin-top:6px" />
    </div>

    <div class="section-header">Profil Effekte</div>
    <div class="form-group">
      <label>Hintergrund-Effekt</label>
      <select id="profileEffect">
        <option value="particles">✨ Partikel (Standard)</option>
        <option value="snow">❄️ Schnee</option>
        <option value="rain">🌧️ Regen</option>
        <option value="stars">⭐ Sterne</option>
        <option value="confetti">🎉 Konfetti</option>
        <option value="bubbles">🫧 Blasen</option>
        <option value="none">— Kein Effekt</option>
      </select>
    </div>
    <div class="form-group">
      <label>Avatar-Ring Stil</label>
      <select id="avatarRing">
        <option value="ring-gradient">🌈 Gradient (Standard)</option>
        <option value="ring-spin">🔄 Drehend</option>
        <option value="ring-pulse">💓 Pulsierend</option>
        <option value="ring-rainbow">🌈 Regenbogen animiert</option>
        <option value="ring-white">⚪ Weiß</option>
      </select>
    </div>
    <div class="form-group">
      <label>Profil-Badge</label>
      <select id="profileBadge">
        <option value="">— Kein Badge</option>
        <option value="verified">✓ Verifiziert</option>
        <option value="premium">★ Premium</option>
        <option value="creator">🎨 Creator</option>
      </select>
    </div>

    <div class="section-header">Soziale Links</div>
    <div class="links-list" id="linksList"></div>
    <button class="btn-add-link" id="addLinkBtn" onclick="addLink()">+ Link hinzufügen</button>

    <div class="section-header">Musikplayer</div>
    <div class="form-group">
      <label>Titel</label>
      <input type="text" id="musicTitle" placeholder="Mein Lieblingssong" maxlength="100" />
    </div>
    <div class="form-group">
      <label>Song Cover URL <span class="input-hint-inline">(Albumcover-Bild)</span></label>
      <input type="url" id="songCover" placeholder="https://example.com/cover.jpg" />
    </div>
    <div class="form-group">
      <label>Audio URL <span class="input-hint-inline">(.mp3 direkter Link)</span></label>
      <input type="url" id="musicUrl" placeholder="https://example.com/song.mp3" />
    </div>

    <div class="section-header">Discord Widget</div>
    <div class="form-group">
      <label>Discord Username</label>
      <input type="text" id="discordUsername" placeholder="deinname" maxlength="50" />
    </div>
    <div class="form-group">
      <label>Discord User ID <span class="input-hint-inline">(für Avatar-Bild)</span></label>
      <input type="text" id="discordUserId" placeholder="123456789012345678" maxlength="30" />
    </div>
    <div class="form-group">
      <label>Servername</label>
      <input type="text" id="discordServerName" placeholder="Mein Server" maxlength="80" />
    </div>
    <div class="form-group">
      <label>Server Invite URL</label>
      <input type="url" id="discordInviteUrl" placeholder="https://discord.gg/..." maxlength="200" />
    </div>

    <div style="height:90px;"></div>
  </div>

  <!-- LIVE PREVIEW PANEL -->
  <div class="dashboard-preview">
    <div class="preview-label">Live-Vorschau</div>
    <div class="preview-phone">
      <div class="profile-preview-card" id="previewCard">
        <div class="preview-views" id="previewViews">👁 0 Aufrufe</div>
        <div class="preview-avatar" id="previewAvatar"><span>🙂</span></div>
        <div class="preview-name" id="previewName">Ihr Name</div>
        <div class="preview-username" id="previewUsername">@username</div>
        <div class="preview-bio" id="previewBio"></div>
        <div class="preview-links" id="previewLinks"></div>
        <div class="preview-music-card" id="previewMusic" style="display:none;">
          <div class="music-title-row">
            <span class="music-icon">♪</span>
            <span class="music-song-title" id="previewMusicTitle">Titel</span>
          </div>
          <div class="music-controls">
            <button class="music-btn play-btn" id="previewPlayBtn" onclick="toggleMusicPreview()">▶</button>
            <div class="music-progress-wrap">
              <div class="music-progress-bar">
                <div class="music-progress-fill" id="previewProgressFill"></div>
              </div>
              <div class="music-time" id="previewMusicTime">0:00 / 0:00</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- SAVE BAR -->
<div class="save-bar">
  <div class="profile-url">Ihr Profil: <a href="#" id="profileUrlLink" target="_blank"></a></div>
  <div class="save-actions">
    <button class="btn btn-ghost" onclick="window.open(profileUrl,'_blank')">Vorschau ↗</button>
    <button class="btn btn-primary" id="saveBtn" onclick="saveProfile()">Änderungen speichern</button>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<audio id="previewAudio" style="display:none;"></audio>
<script src="/js/app.js"></script>
<script src="/js/dashboard.js"></script>
</body>
</html>
