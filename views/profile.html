<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Profile — Slezzi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <script id="profile-data" type="application/json">__PROFILE_DATA__</script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:48px 16px 80px;position:relative;overflow-x:hidden;background:#07070d}
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(168,85,247,.4);border-radius:2px}

    /* backgrounds */
    #bg{position:fixed;inset:0;z-index:0;transition:all .6s}
    #bg-img{position:fixed;inset:0;z-index:0;background-size:cover;background-position:center;transition:all .6s}
    #bg-ov{position:fixed;inset:0;z-index:1;background:rgba(0,0,0,.42)}
    #fx-cv{position:fixed;inset:0;z-index:2;pointer-events:none}
    #cg{position:fixed;pointer-events:none;z-index:3;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(168,85,247,.12) 0%,transparent 70%);transform:translate(-50%,-50%);transition:left .06s,top .06s}

    .wrap{position:relative;z-index:10;width:100%;max-width:480px;display:flex;flex-direction:column;gap:14px;align-items:center}

    /* profile card */
    .profile-card{width:100%;border-radius:22px;overflow:hidden;border:1px solid rgba(255,255,255,.12);box-shadow:0 30px 80px rgba(0,0,0,.7);animation:up .5s ease both}
    @keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .card-hdr{height:140px;position:relative}
    .card-hdr-bg{position:absolute;inset:0;background-size:cover;background-position:center}
    .card-hdr-ov{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.05),rgba(0,0,0,.3))}
    .views-pill{position:absolute;top:12px;left:14px;display:flex;align-items:center;gap:5px;font-size:11px;color:rgba(255,255,255,.85);background:rgba(0,0,0,.35);backdrop-filter:blur(12px);padding:4px 11px;border-radius:20px;border:1px solid rgba(255,255,255,.15)}
    .views-pill svg{width:11px;height:11px;fill:currentColor;opacity:.8}
    .badge{position:absolute;top:12px;right:14px;font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;backdrop-filter:blur(10px);letter-spacing:.5px}
    .badge-verified{background:rgba(59,130,246,.3);border:1px solid rgba(59,130,246,.6);color:#bfdbfe}
    .badge-premium{background:rgba(234,179,8,.25);border:1px solid rgba(234,179,8,.6);color:#fef08a}
    .badge-creator{background:rgba(168,85,247,.3);border:1px solid rgba(168,85,247,.6);color:#e9d5ff}
    .av-wrap{position:absolute;bottom:-52px;left:50%;transform:translateX(-50%);z-index:5}
    .av-ring{width:104px;height:104px;border-radius:50%;padding:3px;box-shadow:0 12px 40px rgba(0,0,0,.7)}
    .av-ring.ring-gradient{background:linear-gradient(135deg,#a855f7,#3b82f6,#ec4899)}
    .av-ring.ring-spin{background:conic-gradient(#a855f7,#3b82f6,#ec4899,#a855f7);animation:spin 2s linear infinite}
    .av-ring.ring-pulse{background:linear-gradient(135deg,#f43f5e,#f97316);animation:pulse 2s ease-in-out infinite}
    .av-ring.ring-rainbow{background:conic-gradient(#f43f5e,#f97316,#eab308,#22c55e,#3b82f6,#a855f7,#f43f5e);animation:spin 3s linear infinite}
    .av-ring.ring-white{background:rgba(255,255,255,.5)}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(244,63,94,.6)}50%{box-shadow:0 0 0 12px rgba(244,63,94,0)}}
    .av-inner{width:100%;height:100%;border-radius:50%;background:#111;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:40px}
    .av-inner img{width:100%;height:100%;object-fit:cover}
    .card-body{background:rgba(8,8,16,.78);backdrop-filter:blur(40px);padding:66px 26px 30px;text-align:center;border-top:1px solid rgba(255,255,255,.07)}
    .disp-name{font-size:24px;font-weight:800;letter-spacing:-.5px;margin-bottom:3px;text-shadow:0 2px 16px rgba(0,0,0,.5)}
    .user-tag{font-size:13px;color:rgba(255,255,255,.5);margin-bottom:14px}
    .bio{font-size:14px;color:rgba(255,255,255,.78);line-height:1.7;max-width:340px;margin:0 auto 20px}
    .icon-links{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:6px}
    .icon-btn{width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;color:#fff;text-decoration:none;transition:.2s}
    .icon-btn svg{width:18px;height:18px;fill:currentColor}
    .icon-btn:hover{background:rgba(255,255,255,.2);transform:translateY(-4px) scale(1.1);box-shadow:0 10px 24px rgba(0,0,0,.5)}
    .link-btns{display:flex;flex-direction:column;gap:9px;width:100%;margin-top:14px}
    .link-btn{display:flex;align-items:center;gap:12px;padding:13px 18px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.09);border-radius:14px;font-size:14px;font-weight:500;color:#fff;text-decoration:none;transition:.2s}
    .link-btn:hover{background:rgba(255,255,255,.14);transform:translateY(-2px);box-shadow:0 10px 28px rgba(0,0,0,.4)}
    .link-btn svg{width:18px;height:18px;fill:currentColor;flex-shrink:0;opacity:.85}
    .link-btn-label{flex:1;text-align:left}
    .link-btn-arrow{opacity:.3;flex-shrink:0}
    .link-btn-arrow svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2}

    /* discord */
    .dc-card{width:100%;background:rgba(88,101,242,.18);backdrop-filter:blur(30px);border:1px solid rgba(88,101,242,.4);border-radius:22px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;animation:up .5s ease .1s both;box-shadow:0 8px 32px rgba(88,101,242,.15)}
    .dc-left{display:flex;align-items:center;gap:14px;min-width:0}
    .dc-av{width:50px;height:50px;border-radius:50%;flex-shrink:0;background:rgba(88,101,242,.4);overflow:hidden;position:relative;border:2px solid rgba(88,101,242,.5)}
    .dc-av img{width:100%;height:100%;object-fit:cover}
    .dc-dot{position:absolute;bottom:1px;right:1px;width:13px;height:13px;border-radius:50%;background:#23a55a;border:2px solid #0f0f1a;box-shadow:0 0 6px rgba(35,165,90,.6)}
    .dc-info{min-width:0}
    .dc-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .dc-server{font-size:12px;color:rgba(148,163,214,.8);margin-top:3px}
    .dc-btn{flex-shrink:0;background:linear-gradient(135deg,#5865f2,#4752c4);color:#fff;text-decoration:none;font-size:13px;font-weight:700;padding:10px 20px;border-radius:12px;transition:.2s;white-space:nowrap;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(88,101,242,.4)}
    .dc-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(88,101,242,.5)}

    /* music */
    .music-card{width:100%;background:rgba(0,0,0,.6);backdrop-filter:blur(40px);border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:18px 20px;animation:up .5s ease .18s both;box-shadow:0 8px 40px rgba(0,0,0,.5)}
    .m-top{display:flex;align-items:center;gap:14px;margin-bottom:14px}
    .m-cover{width:54px;height:54px;border-radius:13px;flex-shrink:0;background:linear-gradient(135deg,#a855f7,#3b82f6);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;box-shadow:0 8px 24px rgba(0,0,0,.4)}
    .m-cover img{width:100%;height:100%;object-fit:cover}
    .m-cover svg{width:22px;height:22px;fill:#fff}
    .m-cover.spin{animation:coverSpin 8s linear infinite}
    @keyframes coverSpin{to{transform:rotate(360deg)}}
    .m-eq{position:absolute;bottom:5px;right:5px;display:flex;gap:2px;align-items:flex-end}
    .m-eq span{width:3px;background:rgba(255,255,255,.9);border-radius:2px;animation:eq .8s ease-in-out infinite}
    .m-eq span:nth-child(1){height:6px}.m-eq span:nth-child(2){height:11px;animation-delay:.15s}.m-eq span:nth-child(3){height:8px;animation-delay:.3s}
    @keyframes eq{0%,100%{transform:scaleY(.35)}50%{transform:scaleY(1)}}
    .m-eq.paused span{animation-play-state:paused}
    .m-meta{flex:1;min-width:0}
    .m-title{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .m-status{font-size:12px;color:rgba(255,255,255,.5);margin-top:3px}
    .m-ctrl{display:flex;align-items:center;gap:6px;flex-shrink:0}
    .m-btn{width:34px;height:34px;border-radius:50%;border:1px solid rgba(255,255,255,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;background:rgba(255,255,255,.08);color:#fff}
    .m-btn svg{width:13px;height:13px;fill:currentColor}
    .m-btn.play{width:42px;height:42px;background:#fff;color:#0a0a0f;border:none;box-shadow:0 4px 20px rgba(255,255,255,.25)}
    .m-btn:hover{transform:scale(1.1)}
    .m-bottom{display:flex;align-items:center;gap:10px}
    .m-vol{opacity:.4;flex-shrink:0;cursor:pointer}
    .m-vol svg{width:15px;height:15px;fill:#fff}
    input[type=range]#volSlider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#fff;cursor:pointer;box-shadow:0 1px 6px rgba(0,0,0,.5);margin-top:-5px}
    input[type=range]#volSlider::-webkit-slider-runnable-track{height:4px;border-radius:2px}
    input[type=range]#volSlider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:#fff;cursor:pointer;border:none;box-shadow:0 1px 6px rgba(0,0,0,.5)}
    input[type=range]#volSlider::-moz-range-track{height:4px;border-radius:2px;background:rgba(255,255,255,.2)}
    .m-prog{flex:1}
    .m-track{width:100%;height:4px;background:rgba(255,255,255,.12);border-radius:2px;cursor:pointer;position:relative}
    .m-fill{height:100%;width:0%;border-radius:2px;background:linear-gradient(to right,#a855f7,#3b82f6);transition:width .1s linear}
    .m-thumb{position:absolute;top:50%;width:12px;height:12px;border-radius:50%;background:#fff;transform:translate(-50%,-50%);left:0%;opacity:0;transition:opacity .2s;box-shadow:0 2px 6px rgba(0,0,0,.5)}
    .m-track:hover .m-thumb{opacity:1}
    .m-times{display:flex;justify-content:space-between;font-size:10px;color:rgba(255,255,255,.45);margin-top:5px}

    .footer{font-size:12px;color:rgba(255,255,255,.2);text-align:center}
    .footer a{color:rgba(168,85,247,.55);text-decoration:none;font-weight:500}
    .footer a:hover{color:#a855f7}
    .nf{text-align:center;padding:80px 20px;position:relative;z-index:10}
    .nf h1{font-size:80px;font-weight:900;opacity:.1}
    .nf p{color:rgba(255,255,255,.5);margin-top:12px}
    @media(max-width:500px){body{padding:32px 12px 60px}.card-body{padding:58px 18px 24px}}
  </style>
</head>
<body>
<div id="bg"></div>
<div id="bg-img"></div>
<div id="bg-ov"></div>
<canvas id="fx-cv"></canvas>
<div id="cg"></div>
<div class="wrap" id="wrap"></div>
<script src="/js/profile.js"></script>
</body>
</html>
