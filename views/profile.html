<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Profile — Slezzi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <script id="profile-data" type="application/json">__PROFILE_DATA__</script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#07070d;--glass:rgba(10,10,20,0.55);--border:rgba(255,255,255,0.1);--text:#fff;--muted:rgba(255,255,255,0.5);--r:24px}
    html{scroll-behavior:smooth}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:52px 16px 90px;position:relative;overflow-x:hidden}
    ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(124,106,255,.4);border-radius:3px}

    /* ── BG LAYER ── */
    #bg-base{position:fixed;inset:0;z-index:0;transition:all .6s ease}
    #bg-image{position:fixed;inset:0;z-index:0;background-size:cover;background-position:center;transition:all .6s ease}
    #bg-overlay{position:fixed;inset:0;z-index:1;background:rgba(0,0,0,.45)}
    #fx-canvas{position:fixed;inset:0;z-index:2;pointer-events:none}
    #cursor-glow{position:fixed;pointer-events:none;z-index:3;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(124,106,255,.13) 0%,transparent 70%);transform:translate(-50%,-50%);transition:left .06s,top .06s}

    /* ── MAIN CONTAINER ── */
    .wrap{position:relative;z-index:10;width:100%;max-width:480px;display:flex;flex-direction:column;gap:14px;align-items:center}

    /* ── PROFILE CARD ── */
    .profile-card{width:100%;border-radius:var(--r);overflow:hidden;border:1px solid var(--border);box-shadow:0 30px 80px rgba(0,0,0,.6);animation:fadeUp .5s ease both}
    @keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}

    .card-header{height:130px;position:relative;flex-shrink:0}
    .card-header-bg{position:absolute;inset:0;background-size:cover;background-position:center}
    .card-header-overlay{position:absolute;inset:0;background:rgba(0,0,0,.2)}

    /* views */
    .views-pill{position:absolute;top:12px;left:14px;display:flex;align-items:center;gap:5px;font-size:11px;color:rgba(255,255,255,.75);background:rgba(0,0,0,.3);backdrop-filter:blur(12px);padding:4px 11px;border-radius:20px;border:1px solid rgba(255,255,255,.12)}
    .views-pill svg{width:11px;height:11px;opacity:.8}

    /* badge */
    .badge{position:absolute;top:12px;right:14px;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.5px}
    .badge-verified{background:rgba(59,130,246,.25);border:1px solid rgba(59,130,246,.5);color:#93c5fd}
    .badge-premium{background:rgba(234,179,8,.2);border:1px solid rgba(234,179,8,.5);color:#fde68a}
    .badge-creator{background:rgba(168,85,247,.25);border:1px solid rgba(168,85,247,.5);color:#d8b4fe}

    /* avatar */
    .avatar-wrap{position:absolute;bottom:-50px;left:50%;transform:translateX(-50%)}
    .avatar-ring{width:100px;height:100px;border-radius:50%;padding:3px;box-shadow:0 10px 40px rgba(0,0,0,.6);position:relative}
    .avatar-ring.ring-gradient{background:linear-gradient(135deg,#a855f7,#3b82f6,#ec4899)}
    .avatar-ring.ring-spin{background:linear-gradient(135deg,#a855f7,#3b82f6);animation:spinRing 3s linear infinite}
    .avatar-ring.ring-pulse{background:linear-gradient(135deg,#f43f5e,#f97316);animation:pulseRing 2s ease-in-out infinite}
    .avatar-ring.ring-rainbow{background:linear-gradient(135deg,#f43f5e,#f97316,#eab308,#22c55e,#3b82f6,#a855f7);animation:rainbowRing 4s linear infinite}
    .avatar-ring.ring-white{background:rgba(255,255,255,.3)}
    @keyframes spinRing{to{transform:rotate(360deg)}}
    @keyframes pulseRing{0%,100%{box-shadow:0 0 0 0 rgba(244,63,94,.5)}50%{box-shadow:0 0 0 10px rgba(244,63,94,0)}}
    @keyframes rainbowRing{to{filter:hue-rotate(360deg)}}
    .avatar-inner{width:100%;height:100%;border-radius:50%;background:#1a1a2e;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:38px}
    .avatar-inner img{width:100%;height:100%;object-fit:cover}

    /* card body */
    .card-body{background:var(--glass);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);padding:62px 26px 28px;text-align:center}
    .display-name{font-size:24px;font-weight:800;letter-spacing:-.5px;margin-bottom:3px;text-shadow:0 2px 12px rgba(0,0,0,.4)}
    .username-tag{font-size:13px;color:var(--muted);margin-bottom:14px}
    .bio{font-size:14px;color:rgba(255,255,255,.78);line-height:1.7;max-width:340px;margin:0 auto 20px}

    /* icon links */
    .icon-links{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:6px}
    .icon-btn{width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;color:#fff;text-decoration:none;transition:.2s}
    .icon-btn svg{width:18px;height:18px;fill:currentColor}
    .icon-btn:hover{background:rgba(255,255,255,.22);transform:translateY(-4px) scale(1.1);box-shadow:0 10px 25px rgba(0,0,0,.4)}

    /* full link btns */
    .link-btns{display:flex;flex-direction:column;gap:9px;width:100%;margin-top:12px}
    .link-btn{display:flex;align-items:center;gap:12px;padding:13px 18px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-radius:14px;font-size:14px;font-weight:500;color:#fff;text-decoration:none;transition:.2s}
    .link-btn:hover{background:rgba(255,255,255,.16);transform:translateY(-2px);box-shadow:0 10px 28px rgba(0,0,0,.35)}
    .link-btn svg{width:18px;height:18px;fill:currentColor;flex-shrink:0;opacity:.85}
    .link-btn-label{flex:1;text-align:left}
    .link-btn-arrow{opacity:.35;flex-shrink:0}
    .link-btn-arrow svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2}

    /* ── DISCORD CARD ── */
    .discord-card{width:100%;background:rgba(88,101,242,.15);backdrop-filter:blur(30px);border:1px solid rgba(88,101,242,.3);border-radius:var(--r);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;animation:fadeUp .5s ease .08s both}
    .dc-left{display:flex;align-items:center;gap:12px;min-width:0}
    .dc-avatar{width:48px;height:48px;border-radius:50%;flex-shrink:0;background:rgba(88,101,242,.3);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
    .dc-avatar img{width:100%;height:100%;object-fit:cover}
    .dc-online{position:absolute;bottom:1px;right:1px;width:12px;height:12px;border-radius:50%;background:#23a55a;border:2px solid #111}
    .dc-info{min-width:0}
    .dc-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .dc-server{font-size:12px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .dc-add{flex-shrink:0;background:#5865f2;color:#fff;text-decoration:none;font-size:13px;font-weight:600;padding:9px 18px;border-radius:10px;transition:.2s;white-space:nowrap;border:none;cursor:pointer}
    .dc-add:hover{background:#4752c4;transform:translateY(-1px)}

    /* ── MUSIC CARD ── */
    .music-card{width:100%;background:rgba(0,0,0,.5);backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,.08);border-radius:var(--r);padding:18px 20px;animation:fadeUp .5s ease .14s both}
    .music-top{display:flex;align-items:center;gap:14px;margin-bottom:14px}
    .music-cover{width:52px;height:52px;border-radius:12px;flex-shrink:0;background:linear-gradient(135deg,#a855f7,#3b82f6);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
    .music-cover img{width:100%;height:100%;object-fit:cover}
    .music-cover svg{width:22px;height:22px;fill:#fff}
    .music-cover.spin{animation:coverSpin 4s linear infinite}
    @keyframes coverSpin{to{transform:rotate(360deg)}}
    .music-eq{position:absolute;bottom:4px;right:4px;display:flex;gap:2px;align-items:flex-end}
    .music-eq span{width:3px;background:rgba(255,255,255,.8);border-radius:2px;animation:eq 1s ease-in-out infinite}
    .music-eq span:nth-child(1){height:8px;animation-delay:0s}
    .music-eq span:nth-child(2){height:14px;animation-delay:.2s}
    .music-eq span:nth-child(3){height:10px;animation-delay:.4s}
    @keyframes eq{0%,100%{transform:scaleY(.5)}50%{transform:scaleY(1)}}
    .music-eq.paused span{animation-play-state:paused}
    .music-meta{flex:1;min-width:0}
    .music-title{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .music-sub{font-size:12px;color:var(--muted);margin-top:3px}
    .music-bottom{display:flex;align-items:center;gap:10px}
    .vol-icon{opacity:.45;flex-shrink:0}
    .vol-icon svg{width:14px;height:14px;fill:#fff}
    .prog-wrap{flex:1}
    .prog-track{width:100%;height:5px;background:rgba(255,255,255,.15);border-radius:3px;cursor:pointer;position:relative}
    .prog-fill{height:100%;width:0%;border-radius:3px;background:linear-gradient(to right,#a855f7,#3b82f6);transition:width .1s linear}
    .prog-thumb{position:absolute;top:50%;width:12px;height:12px;border-radius:50%;background:#fff;transform:translate(-50%,-50%);left:0%;opacity:0;transition:opacity .2s,left .1s linear;box-shadow:0 2px 8px rgba(0,0,0,.4)}
    .prog-track:hover .prog-thumb{opacity:1}
    .prog-times{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:5px}
    .ctrl{display:flex;align-items:center;gap:8px;flex-shrink:0}
    .m-btn{width:34px;height:34px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;background:rgba(255,255,255,.1);color:#fff}
    .m-btn svg{width:13px;height:13px;fill:currentColor}
    .m-btn.play{width:40px;height:40px;background:#fff;color:#0a0a0f;box-shadow:0 4px 20px rgba(255,255,255,.2)}
    .m-btn:hover{transform:scale(1.12)}

    /* ── FOOTER ── */
    .slezzi-footer{font-size:12px;color:rgba(255,255,255,.2);text-align:center;margin-top:4px}
    .slezzi-footer a{color:rgba(124,106,255,.6);text-decoration:none;font-weight:500}
    .slezzi-footer a:hover{color:#7c6aff}

    /* 404 */
    .not-found{text-align:center;padding:80px 20px;position:relative;z-index:10}
    .not-found h1{font-size:80px;font-weight:900;opacity:.1}
    .not-found p{color:var(--muted);margin-top:12px}

    @media(max-width:500px){body{padding:32px 12px 70px}.card-body{padding:58px 18px 24px}}
  </style>
</head>
<body>
<div id="bg-base"></div>
<div id="bg-image"></div>
<div id="bg-overlay"></div>
<canvas id="fx-canvas"></canvas>
<div id="cursor-glow"></div>
<div class="wrap" id="wrap"></div>
<script src="/js/profile.js"></script>
</body>
</html>
